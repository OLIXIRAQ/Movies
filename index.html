<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTech Play</title>
    
    <!-- سكربت التليجرام الأساسي لتشغيل التطبيق المصغر -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* تصغير الأبعاد وإلغاء الهوامش تماماً لجعل الموقع يملأ الشاشة بالكامل */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* كود الـ iframe الممتد من الحافة إلى الحافة */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- السيرفر المفتوح والمخصص للعمل داخل الـ iframe بدون حظر -->
    <iframe 
        src="https://multiembed.mov/" 
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        allow="autoplay; encrypted-media; fullscreen">
    </iframe>

    <script>
        // إعطاء أمر للتليجرام بفتح التطبيق بكامل مساحة شاشة الموبايل تلقائياً
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); 
    </script>
</body>
</html>
