<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTech Play + | سينما التليجرام</title>
    
    <!-- السكربت الرسمي للتليجرام المصغر -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* تصميم فيكتور حديث مستوحى من نيتفليكس */
        body {
            background-color: #141414; /* أسود نيتفليكس الرسمي */
            color: #e5e5e5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الهيدر بتصميم فيكتور فلات مع خط أحمر حاد */
        header {
            background-color: #000000;
            border-bottom: 3px solid #E50914; /* أحمر نيتفليكس الأساسي */
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            color: #E50914; /* اللون الأحمر الحاد للبراند */
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        header p {
            color: #999999;
            margin: 6px 0 0 0;
            font-size: 11px;
            font-weight: 500;
        }

        /* حاوية مشغل الأفلام */
        .main-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(20,20,20,1) 0%, rgba(8,8,8,1) 100%);
        }

        /* إطار المشغل - ستايل فيكتور نظيف وحواف حادة دائرية */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            padding-bottom: 56.25%; /* أبعاد 16:9 السينمائية */
            height: 0;
            background-color: #000000;
            border-radius: 8px; /* حواف مودرن */
            overflow: hidden;
            border: 2px solid #222222;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            transition: border-color 0.3s ease;
        }

        /* تأثير فيكتور خفيف عند التفاعل */
        .player-wrapper:hover {
            border-color: #E50914;
        }

        /* كود الـ iframe المحدث بدون قيود الساندبوكس */
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 2;
        }

        /* الفوتر بتتصميم كلاسيكي نظيف لـ iTech */
        footer {
            background-color: #000000;
            border-top: 1px solid #222222;
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: #737373;
            z-index: 10;
            letter-spacing: 0.2px;
        }
        
        footer a {
            color: #E50914;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: #ff1e27;
        }
    </style>
</head>
<body>

    <header>
        <h1>iTech Play +</h1>
        <p>أحدث الأفلام والمسلسلات مجاناً وبأعلى جودة</p>
    </header>

    <div class="main-container">
        <div class="player-wrapper">
            <!-- الـ iframe هنا جاهز ومصرح له بكامل الصلاحيات والملء الشاشة للتليجرام -->
            <iframe 
                src="https://streamimdb.ru/" 
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true"
                allow="autoplay; encrypted-media; fullscreen">
            </iframe>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة © لـ <a href="https://t.me/iteech" target="_blank">iTech (@iteech)</a> - تطبيق تليجرام المصغر 2026
    </footer>

    <script>
        // تهيئة تطبيق التليجرام المصغر فوراً ليتمدد بكامل الشاشة
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); 
    </script>
</body>
</html>
