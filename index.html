<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- منع الزووم وتخريب الأبعاد بداخل التليجرام -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iTech Player</title>
    
    <!-- السكربت السحري لتشغيل الميني أب -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* جعل حاوية الـ iframe تأخذ مساحة شاشة الموبايل بالكامل */
        .app-container {
            width: 100%;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- السينما المفتوحة بكامل صلاحيات المتصفح والملء الشاشة -->
        <iframe 
            src="https://multiembed.mov/" 
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true"
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>

    <script>
        // إخبار التليجرام أن التطبيق جاهز هسة
        window.Telegram.WebApp.ready();
        
        // إجبار التليجرام على تمديد التطبيق (Expand) ليملأ الشاشة من الأعلى لأسفل كأنه متصفح
        window.Telegram.WebApp.expand(); 
    </script>
</body>
</html>
